services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: upwork
      POSTGRES_USER: upwork
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U upwork"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  scraper:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://upwork:${POSTGRES_PASSWORD}@db:5432/upwork
      WEBSHARE_URL: ${WEBSHARE_URL}
      SCRAPE_INTERVAL: ${SCRAPE_INTERVAL:-120}
      MAX_PAGES: ${MAX_PAGES:-3}
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

volumes:
  pgdata:
